name: Build Dual Releases

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (без LFS)
        uses: actions/checkout@v4
        id: checkout_lite

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Lite version (без видео)
        run: |
          npm run build
          # Переименовываем _site для lite версии
          mv _site _site_lite
          
      - name: Build Full version (с видео)
        run: |
          # Загружаем LFS файлы
          git lfs fetch --all
          git lfs checkout
          
          # Копируем видео в папку src/vid если их нет
          if [ ! -d "src/vid" ] || [ -z "$(ls -A src/vid/*.mp4 2>/dev/null)" ]; then
            echo "Видео не найдены, используем заглушки"
            mkdir -p src/vid
            # Создаем заглушки (опционально)
            echo "<!-- Video placeholder -->" > src/vid/video-placeholder.html
          fi
          
          # Собираем полную версию
          npm run build
          mv _site _site_full

      - name: Create ZIP archives
        run: |
          sudo apt-get install -y zip
          
          # Lite версия (без видео)
          cd _site_lite
          zip -r ../stroi.etos.ru-lite-v${{ github.ref_name }}.zip .
          cd ..
          
          # Full версия (с видео)
          cd _site_full
          zip -r ../stroi.etos.ru-full-v${{ github.ref_name }}.zip .
          cd ..

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            ## Две версии сайта:
            
            ### 🚀 Lite версия (рекомендуется)
            - **stroi.etos.ru-lite-v${{ github.ref_name }}.zip** - без видео
            - Меньший размер (~5-10MB)
            - Быстрая загрузка
            - Видео заменены на заглушки с описанием
            
            ### 🎬 Full версия
            - **stroi.etos.ru-full-v${{ github.ref_name }}.zip** - с видео
            - Полный функционал
            - Большой размер (~50-100MB)
            - Все видеофайлы включены
            
            ### Что нового:
            - Добавлена легкая версия без видео
            - Оптимизирована загрузка
          draft: false
          prerelease: false

      - name: Upload Lite ZIP
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./stroi.etos.ru-lite-v${{ github.ref_name }}.zip
          asset_name: stroi.etos.ru-lite-v${{ github.ref_name }}.zip
          asset_content_type: application/zip

      - name: Upload Full ZIP
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./stroi.etos.ru-full-v${{ github.ref_name }}.zip
          asset_name: stroi.etos.ru-full-v${{ github.ref_name }}.zip
          asset_content_type: application/zip