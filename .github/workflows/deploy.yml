name: Build and Deploy Eleventy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with LFS  # ИЗМЕНЕНО
        uses: actions/checkout@v4
        with:
          lfs: true  # ДОБАВЛЕНО

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with Eleventy
        run: npm run build

      - name: Verify videos are present  # НОВЫЙ ШАГ
        run: |
          # Проверяем, что видеофайлы в сборке
          find _site -name "*.mp4" -o -name "*.webm" | head -5 || echo "Видеофайлы не найдены"
          
          # Проверяем их размер
          find _site -name "*.mp4" -o -name "*.webm" -exec ls -lh {} \; 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4